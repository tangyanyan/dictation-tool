<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligent Transcription</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --background: 0 0% 3.9%;
            --foreground: 0 0% 98%;
            --card: 0 0% 3.9%;
            --card-foreground: 0 0% 98%;
            --popover: 0 0% 3.9%;
            --popover-foreground: 0 0% 98%;
            --primary: 0 0% 98%;
            --primary-foreground: 0 0% 9%;
            --secondary: 0 0% 14.9%;
            --secondary-foreground: 0 0% 98%;
            --muted: 0 0% 14.9%;
            --muted-foreground: 0 0% 63.9%;
            --accent: 0 0% 14.9%;
            --accent-foreground: 0 0% 98%;
            --destructive: 0 62.8% 30.6%;
            --destructive-foreground: 0 0% 98%;
            --border: 0 0% 14.9%;
            --input: 0 0% 14.9%;
            --ring: 0 0% 83.1%;
            --radius: 0.5rem;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: hsl(var(--background));
            color: hsl(var(--foreground));
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Light Rays Background */
        .light-rays-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.15) 30%, rgba(255,255,255,0) 70%);
            box-shadow: 0 0 80px 30px rgba(255,255,255,0.25);
            z-index: 0;
            pointer-events: none;
        }

        .light-rays-bg::before,
        .light-rays-bg::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 400%;
            height: 2px;
            background: linear-gradient(90deg, rgba(255,255,255,0.35) 0%, rgba(255,255,255,0) 100%);
            transform-origin: left center;
            animation: rotateRays 25s linear infinite;
            box-shadow: 0 0 15px rgba(255,255,255,0.4);
        }

        .light-rays-bg::after {
            width: 350%;
            height: 1.5px;
            animation: rotateRaysReverse 35s linear infinite;
            animation-delay: -5s;
        }

        @keyframes rotateRays {
            from {
                transform: translateX(-50%) rotate(0deg);
            }
            to {
                transform: translateX(-50%) rotate(360deg);
            }
        }

        @keyframes rotateRaysReverse {
            from {
                transform: translateX(-50%) rotate(360deg);
            }
            to {
                transform: translateX(-50%) rotate(0deg);
            }
        }

        .container {
            position: relative;
            z-index: 1;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .subtitle {
            text-align: center;
            color: hsl(var(--muted-foreground));
            margin-bottom: 72px;
            font-size: 12px;
        }

        /* 上传区域 */
        .upload-section {
            --transition: 350ms;
            --folder-W: 120px;
            --folder-H: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding: 20px;
            background: linear-gradient(135deg, #f162ba, #ed45ae);
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            height: calc(var(--folder-H) * 1.7);
            width: 240px;
            margin: 0 auto 24px auto;
            border: none;
            cursor: pointer;
            transition: all var(--transition) ease;
            position: relative;
        }

        .upload-section:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .upload-section.dragover {
            background: linear-gradient(135deg, #ff7ed4, #ff5cb8);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }

        .folder {
            position: absolute;
            top: 5px;
            left: calc(50% - 60px);
            animation: float 2.5s infinite ease-in-out;
            transition: transform var(--transition) ease;
            pointer-events: none;
        }

        .folder:hover {
            transform: scale(1.05);
        }

        .folder .front-side,
        .folder .back-side {
            position: absolute;
            transition: transform var(--transition);
            transform-origin: bottom center;
            top: 0;
            left: 0;
        }

        .folder .back-side::before,
        .folder .back-side::after {
            content: "";
            display: block;
            background-color: white;
            opacity: 0.5;
            width: var(--folder-W);
            height: var(--folder-H);
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: bottom center;
            border-radius: 15px;
            transition: transform 350ms;
            z-index: 0;
        }

        .upload-section:hover .back-side::before {
            transform: rotateX(-5deg) skewX(5deg);
        }
        
        .upload-section:hover .back-side::after {
            transform: rotateX(-15deg) skewX(12deg);
        }

        .folder .front-side {
            z-index: 1;
        }

        .upload-section:hover .front-side {
            transform: rotateX(-40deg) skewX(15deg);
        }

        .folder .tip {
            background: linear-gradient(135deg, #ff9a56, #ff6f56);
            width: 80px;
            height: 20px;
            border-radius: 12px 12px 0 0;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            position: absolute;
            top: -10px;
            left: 0;
            z-index: 2;
        }

        .folder .cover {
            background: linear-gradient(135deg, #ffe563, #ffc663);
            width: var(--folder-W);
            height: var(--folder-H);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }

        .upload-text {
            font-size: 1.1em;
            color: #ffffff;
            text-align: center;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            transition: background var(--transition) ease;
            display: inline-block;
            width: 100%;
            padding: 10px 35px;
            position: relative;
            z-index: 10;
            pointer-events: none;
            line-height: 1.4;
        }

        .upload-section:hover .upload-text {
            background: rgba(255, 255, 255, 0.4);
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-20px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        #fileInput {
            display: none;
        }

        /* 缩略图容器 */
        .thumbnails-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
            justify-content: center;
            max-width: 900px;
        }

        .thumbnail-item {
            position: relative;
            width: 80px;
            height: 80px;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid hsl(var(--border));
        }

        .thumbnail-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .thumbnail-item .remove-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: hsl(var(--destructive));
            color: hsl(var(--destructive-foreground));
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .thumbnail-item:hover .remove-btn {
            opacity: 1;
        }

        /* 图片预览弹窗 */
        .image-preview-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 40px;
        }

        .image-preview-overlay.show {
            display: flex;
        }

        .image-preview-overlay img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .image-preview-overlay .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: hsl(var(--secondary));
            color: hsl(var(--secondary-foreground));
            border: none;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .image-preview-overlay .close-btn:hover {
            background: hsl(var(--destructive));
            color: hsl(var(--destructive-foreground));
        }

        /* OCR 状态 */
        .status {
            padding: 12px 16px;
            border-radius: var(--radius);
            margin-bottom: 24px;
            display: none;
            font-size: 14px;
        }

        .status.loading {
            display: flex;
            align-items: center;
            gap: 8px;
            background: hsl(var(--secondary));
            color: hsl(var(--secondary-foreground));
        }

        .status.success {
            display: block;
            background: hsl(142.1 76.2% 36.3% / 0.1);
            color: hsl(142.1 76.2% 36.3%);
            border: 1px solid hsl(142.1 76.2% 36.3% / 0.2);
        }

        .status.error {
            display: block;
            background: hsl(var(--destructive) / 0.1);
            color: hsl(var(--destructive-foreground));
            border: 1px solid hsl(var(--destructive) / 0.2);
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid hsl(var(--muted));
            border-top-color: hsl(var(--foreground));
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Recognition Results编辑区 */
        .result-section {
            margin-bottom: 24px;
            display: none;
        }

        .result-section.show {
            display: block;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .result-header h2 {
            font-size: 16px;
            font-weight: 600;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .btn-primary {
            background: hsl(var(--primary));
            color: hsl(var(--primary-foreground));
        }

        .btn-primary:hover {
            background: hsl(var(--primary) / 0.9);
        }

        .btn-secondary {
            background: hsl(var(--secondary));
            color: hsl(var(--secondary-foreground));
        }

        .btn-secondary:hover {
            background: hsl(var(--secondary) / 0.8);
        }

        .btn-ghost {
            background: transparent;
            color: hsl(var(--muted-foreground));
        }

        .btn-ghost:hover {
            background: hsl(var(--accent));
            color: hsl(var(--accent-foreground));
        }

        .btn-destructive {
            background: hsl(var(--destructive));
            color: hsl(var(--destructive-foreground));
        }

        .btn-destructive:hover {
            background: hsl(var(--destructive) / 0.9);
        }

        .result-list {
            background: hsl(var(--card));
            border-radius: var(--radius);
            border: 1px solid hsl(var(--border));
            padding: 16px;
            max-height: 400px;
            overflow-y: auto;
        }

        .result-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            padding: 10px 12px;
            background: hsl(var(--secondary));
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .result-item:last-child {
            margin-bottom: 0;
        }

        .result-item.current-playing {
            background: hsl(217.2 91.2% 59.8% / 0.1);
            border: 1px solid hsl(217.2 91.2% 59.8% / 0.3);
        }

        .item-number {
            color: hsl(var(--muted-foreground));
            font-size: 12px;
            font-weight: 500;
            min-width: 24px;
        }

        .item-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 14px;
            color: hsl(var(--foreground));
            outline: none;
        }

        .item-input:focus {
            background: hsl(var(--background));
            border-radius: 4px;
            padding: 4px 8px;
            margin: -4px -8px;
        }

        .btn-delete {
            padding: 4px 8px;
            font-size: 16px;
            color: hsl(var(--muted-foreground));
            background: transparent;
        }

        .btn-delete:hover {
            color: hsl(var(--destructive));
            background: hsl(var(--destructive) / 0.1);
        }

        .btn-speak {
            padding: 4px 8px;
            font-size: 16px;
            color: hsl(var(--muted-foreground));
            background: transparent;
        }

        .btn-speak:hover {
            color: hsl(217.2 91.2% 59.8%);
            background: hsl(217.2 91.2% 59.8% / 0.1);
        }

        /* Play控制区 */
        .player-section {
            background: hsl(var(--card));
            border-radius: var(--radius);
            border: 1px solid hsl(var(--border));
            padding: 24px;
        }

        .progress-indicator {
            text-align: center;
            font-size: 14px;
            color: hsl(var(--muted-foreground));
            margin-bottom: 20px;
        }

        .progress-indicator strong {
            color: hsl(var(--foreground));
            font-size: 18px;
        }

        .player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .btn-play {
            width: 140px;
            height: 56px;
            border-radius: 50px;
            background-image: linear-gradient(135deg, #feb692 0%, #ea5455 100%);
            box-shadow: 0 20px 30px -6px rgba(238, 103, 97, 0.5);
            border: none;
            cursor: pointer;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease-in-out;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .btn-play #playIcon {
            font-size: 28px;
        }

        .btn-play-text {
            position: absolute;
            bottom: -32px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            font-weight: 500;
            color: hsl(var(--muted-foreground));
            white-space: nowrap;
        }

        .btn-play:hover {
            transform: translateY(3px);
            box-shadow: none;
        }

        .btn-play:active {
            opacity: 0.5;
        }

        .btn-play:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-nav {
            padding: 8px 12px;
        }

        /* 间隔设置 */
        .interval-section {
            padding-top: 20px;
            border-top: 1px solid hsl(var(--border));
        }

        .interval-section h3 {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 16px;
            color: hsl(var(--muted-foreground));
        }

        .interval-slider {
            width: 100%;
            margin: 16px 0;
            -webkit-appearance: none;
            height: 4px;
            border-radius: 2px;
            background: hsl(var(--secondary));
            outline: none;
        }

        .interval-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: hsl(var(--primary));
            cursor: pointer;
            transition: transform 0.2s;
        }

        .interval-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .interval-slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: hsl(var(--primary));
            cursor: pointer;
            border: none;
        }

        .interval-labels {
            display: flex;
            justify-content: space-between;
        }

        .interval-label {
            text-align: center;
            color: hsl(var(--muted-foreground));
            font-size: 12px;
            transition: all 0.2s ease;
        }

        .interval-label.active {
            color: hsl(var(--foreground));
            font-weight: 500;
        }

        .interval-value {
            text-align: center;
            font-size: 28px;
            font-weight: 600;
            margin-top: 12px;
            color: hsl(var(--foreground));
        }

        .interval-unit {
            font-size: 14px;
            color: hsl(var(--muted-foreground));
            font-weight: 400;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            body {
                padding: 20px 16px;
            }

            h1 {
                font-size: 22px;
            }

            .player-controls {
                flex-direction: column;
                gap: 12px;
            }

            .result-item {
                flex-wrap: wrap;
            }
        }

        /* 滚动 items样式 */
        .result-list::-webkit-scrollbar {
            width: 6px;
        }

        .result-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .result-list::-webkit-scrollbar-thumb {
            background: hsl(var(--border));
            border-radius: 3px;
        }

        .result-list::-webkit-scrollbar-thumb:hover {
            background: hsl(var(--muted-foreground));
        }

        /* Shadcn/ui style select wrapper */
        .select-wrapper {
            position: relative;
            display: inline-flex;
            align-items: center;
        }

        .select-wrapper select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            padding: 8px 36px 8px 12px;
            padding-right: 36px;
            border-radius: 6px;
            background: hsl(var(--background));
            color: hsl(var(--foreground));
            border: 1px solid hsl(var(--border));
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 80px;
        }

        .select-wrapper select:hover {
            border-color: hsl(var(--ring));
        }

        .select-wrapper select:focus {
            outline: none;
            border-color: hsl(var(--ring));
            box-shadow: 0 0 0 2px hsl(var(--ring) / 0.2);
        }

        .select-wrapper select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .select-icon {
            position: absolute;
            right: 10px;
            pointer-events: none;
            color: hsl(var(--muted-foreground));
            transition: transform 0.2s;
        }

        .select-wrapper:hover .select-icon {
            color: hsl(var(--foreground));
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Intelligent Transcription</h1>
        <p class="subtitle">Upload handwriting images → OCR recognition → Voice dictation</p>

        <!-- 上传区域 -->
        <div class="upload-section" id="uploadArea">
            <div class="folder">
                <div class="back-side">
                    <div class="cover"></div>
                </div>
                <div class="front-side">
                    <div class="tip"></div>
                    <div class="cover"></div>
                </div>
            </div>
            <div class="upload-text">
                Upload a File
            </div>
            <input type="file" id="fileInput" accept="image/*" multiple>
        </div>

        <!-- 缩略图容器 -->
        <div class="thumbnails-container" id="thumbnailsContainer"></div>

        <!-- 状态提示 -->
        <div class="status" id="status"></div>

        <!-- Recognition Results区域 -->
        <div class="result-section" id="resultSection">
            <div class="result-header">
                <h2>Recognition Results</h2>
                <button class="btn btn-secondary" onclick="addItem()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 6px;">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Add Entry
                </button>
            </div>
            <div class="result-list" id="resultList"></div>
        </div>

        <!-- 图片预览弹窗 -->
        <div class="image-preview-overlay" id="imagePreview">
            <button class="close-btn" onclick="closeImagePreview()">×</button>
            <img id="previewImage" src="" alt="Preview">
        </div>

        <!-- Player Controls -->
        <div class="player-section" id="playerSection">
            <div class="progress-indicator" id="progressIndicator" style="display: none;">
                Preparing to play item  <strong id="currentIndex">1</strong> / <strong id="totalCount">0</strong>  items
            </div>

            <div class="player-controls">
                <button class="btn btn-secondary btn-nav" onclick="prevItem()" id="btnPrev" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 6px; vertical-align: middle;">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                    <span style="vertical-align: middle;">Previous</span>
                </button>
                <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
                    <button class="btn btn-play" onclick="togglePlay()" id="btnPlay" disabled>
                        <span id="playIcon">▶</span>
                    </button>
                    <span class="btn-play-text" id="playText">Start Dictation</span>
                </div>
                <button class="btn btn-secondary btn-nav" onclick="nextItem()" id="btnNext" disabled>
                    <span style="vertical-align: middle;">Next</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-left: 6px; vertical-align: middle;">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
            </div>

            <!-- Settings -->
            <div style="display: flex; justify-content: center; align-items: center; gap: 24px; margin-top: 20px;">
                <!-- Interval -->
                <div style="display: flex; align-items: center; gap: 8px;">
                    <label style="font-size: 13px; color: hsl(var(--muted-foreground));">Interval</label>
                    <div class="select-wrapper">
                        <select id="intervalSlider">
                            <option value="5">5s</option>
                            <option value="10" selected>10s</option>
                            <option value="15">15s</option>
                            <option value="20">20s</option>
                            <option value="25">25s</option>
                        </select>
                        <svg class="select-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </div>
                </div>

                <!-- Loop Count -->
                <div style="display: flex; align-items: center; gap: 8px;">
                    <label style="font-size: 13px; color: hsl(var(--muted-foreground));">Loop Count</label>
                    <div class="select-wrapper">
                        <select id="loopCount">
                            <option value="1">1x</option>
                            <option value="2">2x</option>
                            <option value="3">3x</option>
                            <option value="4">4x</option>
                            <option value="5">5x</option>
                        </select>
                        <svg class="select-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </div>
                </div>
            </div>
            </div>
        </div>
    </div>

    <script>
        // Global state
        let uploadedFiles = []; // Store uploaded files
        let items = [];
        let currentIndex = 0;
        let isPlaying = false;
        let playTimeout = null;
        let speechSynth = window.speechSynthesis;
        let currentUtterance = null;

        // File upload
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const thumbnailsContainer = document.getElementById('thumbnailsContainer');

        uploadArea.addEventListener('click', (e) => {
            if (e.target.closest('.remove-btn') || e.target.closest('.thumbnail-item')) return;
            fileInput.click();
        });

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
            if (files.length > 0) {
                handleFiles(files);
            }
        });

        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            if (files.length > 0) {
                handleFiles(files);
            }
        });

        // Handle multiple files
        function handleFiles(files) {
            files.forEach(file => {
                uploadedFiles.push(file);
                addThumbnail(file);
            });
            
            // 自动开始OCR识别所有图片
            processAllImages();
        }

        // Add thumbnail
        function addThumbnail(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const imageData = e.target.result;
                const item = document.createElement('div');
                item.className = 'thumbnail-item';
                item.dataset.name = file.name;
                item.dataset.image = imageData;
                item.innerHTML = `
                    <img src="${imageData}" alt="${file.name}" onclick="showImagePreview('${file.name}')">
                    <button class="remove-btn" onclick="event.stopPropagation(); removeThumbnail('${file.name}')">×</button>
                `;
                item.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('remove-btn')) {
                        showImagePreview(file.name);
                    }
                });
                thumbnailsContainer.appendChild(item);
            };
            reader.readAsDataURL(file);
        }

        // Show image preview
        function showImagePreview(fileName) {
            const thumb = thumbnailsContainer.querySelector(`[data-name="${fileName}"]`);
            if (thumb) {
                const imageData = thumb.dataset.image;
                document.getElementById('previewImage').src = imageData;
                document.getElementById('imagePreview').classList.add('show');
            }
        }

        // Close image preview
        function closeImagePreview() {
            document.getElementById('imagePreview').classList.remove('show');
        }

        // Click overlay to close preview
        document.getElementById('imagePreview').addEventListener('click', (e) => {
            if (e.target.id === 'imagePreview') {
                closeImagePreview();
            }
        });

        // ESC key to close preview
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeImagePreview();
            }
        });

        // Remove thumbnail
        function removeThumbnail(fileName) {
            uploadedFiles = uploadedFiles.filter(f => f.name !== fileName);
            const thumb = thumbnailsContainer.querySelector(`[data-name="${fileName}"]`);
            if (thumb) thumb.remove();
            
            // If images remain, re-recognize
            if (uploadedFiles.length > 0) {
                processAllImages();
            } else {
                items = [];
                renderResultList();
            }
        }

        // Process all images
        async function processAllImages() {
            const status = document.getElementById('status');
            status.className = 'status loading';
            status.innerHTML = '<div class="spinner"></div>Recognizing...';

            const allTexts = [];

            for (let i = 0; i < uploadedFiles.length; i++) {
                try {
                    const base64 = await fileToBase64(uploadedFiles[i]);
                    const text = await performOCR(base64, i + 1, uploadedFiles.length);
                    if (text) {
                        allTexts.push(text);
                    }
                } catch (error) {
                    console.error('OCR error for file:', uploadedFiles[i].name, error);
                }
            }

            if (allTexts.length > 0) {
                processOCRResult(allTexts.join('\n'));
                status.className = 'status success';
                status.textContent = `Recognition completed with ${items.length}  items内容`;
            } else {
                status.className = 'status error';
                status.textContent = 'Recognition failed, please retry';
            }
        }

        // File to Base64
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // Detect English character ratio
        function detectEnglishRatio(text) {
            if (!text || text.trim().length === 0) return 0;
            
            const cleanText = text.replace(/\s+/g, ''); // 移除空格
            if (cleanText.length === 0) return 0;
            
            // Count English letters (including uppercase and lowercase)
            const englishChars = (cleanText.match(/[a-zA-Z]/g) || []).length;
            
            // Calculate ratio
            return englishChars / cleanText.length;
        }

        // OCR recognition - Auto-detect language
        async function performOCR(imageBase64, current, total) {
            try {
                const base64Data = imageBase64.split(',')[1];
                
                // Step 1: Use English recognition to quickly detect language
                const formData = new FormData();
                formData.append('base64Image', 'data:image/png;base64,' + base64Data);
                formData.append('apikey', 'K83524497588957');
                formData.append('language', 'eng'); // First use English
                formData.append('isOverlayRequired', 'false');
                formData.append('OCREngine', '2');
                
                let response = await fetch('https://api.ocr.space/parse/image', {
                    method: 'POST',
                    body: formData
                });

                let result = await response.json();
                
                if (result.OCRExitCode === 1 && result.ParsedResults && result.ParsedResults.length > 0) {
                    const text = result.ParsedResults[0].ParsedText;
                    const englishRatio = detectEnglishRatio(text);
                    
                    // 如果English ratio >= 80%，直接返回结果
                    if (englishRatio >= 0.8) {
                        console.log(`Detected English document (English ratio: ${(englishRatio * 100).toFixed(1)}%)`);
                        return text;
                    }
                    
                    // 如果English ratio < 80%，用中文重新识别
                    console.log(`Detected Chinese/mixed document (English ratio: ${(englishRatio * 100).toFixed(1)}%)，Re-recognizing...`);
                    
                    const formDataChs = new FormData();
                    formDataChs.append('base64Image', 'data:image/png;base64,' + base64Data);
                    formDataChs.append('apikey', 'K83524497588957');
                    formDataChs.append('language', 'chs'); // Simplified Chinese
                    formDataChs.append('isOverlayRequired', 'false');
                    formDataChs.append('OCREngine', '2');
                    
                    response = await fetch('https://api.ocr.space/parse/image', {
                        method: 'POST',
                        body: formDataChs
                    });
                    
                    result = await response.json();
                    
                    if (result.OCRExitCode === 1 && result.ParsedResults && result.ParsedResults.length > 0) {
                        return result.ParsedResults[0].ParsedText;
                    }
                }
                
                if (result.ErrorMessage) {
                    console.error('OCR Error:', result.ErrorMessage);
                }
                return null;
            } catch (error) {
                console.error('OCR error:', error);
                return null;
            }
        }

        // Process OCR result
        function processOCRResult(text) {
            // Split by line and filter empty lines
            let lines = text.split('\n')
                .map(line => line.trim())
                .filter(line => line.length > 0);
            
            // Remove leading sequence numbers（如 "1. ", "2. ", "1、", "2、" 等）
            lines = lines.map(line => {
                return line.replace(/^[\d]+[.、\s]+/, '').trim();
            }).filter(line => line.length > 0);
            
            items = lines;
            currentIndex = 0;
            
            // Show result section
            document.getElementById('resultSection').classList.add('show');
            renderResultList();
            
            // 启用Play按钮
            document.getElementById('btnPlay').disabled = false;
            document.getElementById('btnPrev').disabled = false;
            document.getElementById('btnNext').disabled = false;
            updateProgress();
        }

        // Render result list
        function renderResultList() {
            const list = document.getElementById('resultList');
            list.innerHTML = items.map((item, index) => `
                <div class="result-item ${index === currentIndex ? 'current-playing' : ''}" data-index="${index}">
                    <span class="item-number">${index + 1}.</span>
                    <input type="text" class="item-input" value="${item}" onchange="updateItem(${index}, this.value)">
                    <button class="btn btn-speak" onclick="speakSingleItem(${index})" title="Play">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                        </svg>
                    </button>
                    <button class="btn btn-delete" onclick="deleteItem(${index})" title="Delete">×</button>
                </div>
            `).join('');
        }

        // 单独Play某一 items
        function speakSingleItem(index) {
            if (index < 0 || index >= items.length) return;
            
            const text = items[index];
            const loopCount = parseInt(document.getElementById('loopCount').value);
            
            // 停止当前Play
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            if (currentUtterance) {
                speechSynth.cancel();
            }
            
            // 循环Play
            let currentLoop = 0;
            const playLoop = () => {
                if (currentLoop >= loopCount) return;
                currentLoop++;
                
                speakText(text, () => {
                    if (currentLoop < loopCount) {
                        setTimeout(() => playLoop(), 500); // Loop interval 0.5s
                    }
                });
            };
            
            playLoop();
        }

        // 更新 items目
        function updateItem(index, value) {
            items[index] = value;
        }

        // Add Entry
        function addItem() {
            items.push('');
            renderResultList();
            updateProgress();
        }

        // Delete items目
        function deleteItem(index) {
            items.splice(index, 1);
            if (currentIndex >= items.length) {
                currentIndex = Math.max(0, items.length - 1);
            }
            renderResultList();
            updateProgress();
        }

        // Update progress indicator
        function updateProgress() {
            document.getElementById('currentIndex').textContent = currentIndex + 1;
            document.getElementById('totalCount').textContent = items.length;
            document.getElementById('progressIndicator').style.display = 'block';
        }

        // Play/暂停
        function togglePlay() {
            if (isPlaying) {
                stopPlay();
            } else {
                startPlay();
            }
        }

        // 开始Play
        function startPlay() {
            if (items.length === 0) return;
            
            isPlaying = true;
            document.getElementById('playIcon').textContent = '⏸';
            document.getElementById('playText').textContent = 'Restart';
            
            playCurrentItem();
        }

        // 停止Play
        function stopPlay() {
            isPlaying = false;
            document.getElementById('playIcon').textContent = '▶';
            document.getElementById('playText').textContent = 'Start Dictation';
            
            if (playTimeout) {
                clearTimeout(playTimeout);
                playTimeout = null;
            }
            
            // Stop audio
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            
            // Stop browser built-in TTS
            if (currentUtterance) {
                speechSynth.cancel();
            }
        }

        // Play当前 items目
        function playCurrentItem() {
            if (!isPlaying || currentIndex >= items.length) {
                // Play完成，重置
                currentIndex = 0;
                stopPlay();
                renderResultList();
                return;
            }
            
            renderResultList();
            updateProgress();
            
            const text = items[currentIndex];
            const interval = parseInt(document.getElementById('intervalSlider').value) * 1000;
            const loopCount = parseInt(document.getElementById('loopCount').value);
            
            // Start speaking after 3s
            playTimeout = setTimeout(() => {
                if (!isPlaying) return;
                
                // 循环Play当前 items目
                let currentLoop = 0;
                const playLoop = () => {
                    if (!isPlaying || currentLoop >= loopCount) {
                        // 循环完成，PlayNext
                        playTimeout = setTimeout(() => {
                            currentIndex++;
                            playCurrentItem();
                        }, interval);
                        return;
                    }
                    
                    currentLoop++;
                    speakText(text, () => {
                        if (currentLoop < loopCount) {
                            setTimeout(() => playLoop(), 500); // Loop interval 0.5s
                        } else {
                            // 循环完成，PlayNext
                            playTimeout = setTimeout(() => {
                                currentIndex++;
                                playCurrentItem();
                            }, interval);
                        }
                    });
                };
                
                playLoop();
            }, 3000);
        }

        // Speech synthesis - Using Google Translate TTS API (free, natural)
        let currentAudio = null;

        function speakText(text, onEnd) {
            // 停止当前Play
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            
            // 检测文本语言
            const englishRatio = detectEnglishRatio(text);
            const lang = englishRatio >= 0.8 ? 'en' : 'zh-CN';
            
            // 使用 Google Translate TTS API
            const apiUrl = `https://translate.google.com/translate_tts?ie=UTF-8&tl=${lang}&client=tw-ob&q=${encodeURIComponent(text)}`;
            
            currentAudio = new Audio(apiUrl);
            
            currentAudio.onended = () => {
                if (onEnd) onEnd();
            };
            
            currentAudio.onerror = (e) => {
                console.error('Google TTS error:', e);
                // 回退到浏览器内置 TTS
                fallbackSpeakText(text, onEnd);
            };
            
            currentAudio.play().catch((e) => {
                console.error('Audio play error:', e);
                // 回退到浏览器内置 TTS
                fallbackSpeakText(text, onEnd);
            });
        }

        // Fallback: Browser built-in TTS (select best voice)
        async function fallbackSpeakText(text, onEnd) {
            if (currentUtterance) {
                speechSynth.cancel();
            }
            
            // Wait for voice list to load
            await new Promise(resolve => {
                let voices = speechSynth.getVoices();
                if (voices.length > 0) {
                    resolve();
                } else {
                    speechSynth.onvoiceschanged = resolve;
                }
            });
            
            const voices = speechSynth.getVoices();
            const englishRatio = detectEnglishRatio(text);
            
            currentUtterance = new SpeechSynthesisUtterance(text);
            currentUtterance.lang = englishRatio >= 0.8 ? 'en-US' : 'zh-CN';
            currentUtterance.rate = 0.9;
            currentUtterance.pitch = 1;
            currentUtterance.volume = 1;
            
            // Select best voice (prioritize Google and Microsoft neural network voices)
            const bestVoice = voices.find(voice => 
                englishRatio >= 0.8 
                    ? (voice.lang.includes('en-US') || voice.lang.includes('en-US')) && 
                      (voice.name.includes('Google') || voice.name.includes('Microsoft') || voice.name.includes('Samantha'))
                    : voice.lang.includes('zh-CN') && 
                      (voice.name.includes('Google') || voice.name.includes('Microsoft') || voice.name.includes('Ting-Ting'))
            );
            
            if (bestVoice) {
                currentUtterance.voice = bestVoice;
                console.log('Using voice:', bestVoice.name);
            }
            
            currentUtterance.onend = () => {
                if (onEnd) onEnd();
            };
            
            currentUtterance.onerror = (e) => {
                console.error('Speech error:', e);
                if (onEnd) onEnd();
            };
            
            speechSynth.speak(currentUtterance);
        }

        // Previous
        function prevItem() {
            if (currentIndex > 0) {
                currentIndex--;
                renderResultList();
                updateProgress();
            }
        }

        // Next
        function nextItem() {
            if (currentIndex < items.length - 1) {
                currentIndex++;
                renderResultList();
                updateProgress();
            }
        }

        // Start Dictation按钮
        function startDictation() {
            if (items.length === 0) {
                return;
            }
            
            document.getElementById('playerSection').scrollIntoView({ behavior: 'smooth' });
            
            setTimeout(() => {
                startPlay();
            }, 500);
        }

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            stopPlay();
        });
    </script>
</body>
</html>
